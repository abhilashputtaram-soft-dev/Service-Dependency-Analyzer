server.port=8082
spring.application.name=service-dependency-analyzer

logging.level.root=INFO

# Serialize Instant/dates as ISO-8601 strings (not epoch timestamps)
spring.jackson.serialization.write-dates-as-timestamps=false

# Ingestion pipeline
ingestion.queue-capacity=100000
ingestion.producer-threads=8
ingestion.consumer-threads=8

# Springdoc / Swagger UI
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.try-it-out-enabled=true

# Graph persistence / snapshotting
snapshot.enabled=true
snapshot.path=src/main/resources/graph-snapshot.json
snapshot.interval-seconds=60
